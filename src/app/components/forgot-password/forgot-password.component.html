<section id="forgot-password" class="forgot-password py-5">
  <div class="container" data-aos="fade-up">

    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">

        <div class="form-card-premium">
          <div class="form-header-premium">
            <h3><i class="fas fa-key me-2"></i>Réinitialisation</h3>
            <p>Saisissez votre e-mail pour recevoir un lien de réinitialisation</p>
          </div>

          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" method="post" role="form">

            <div class="input-group-custom">
              <i class="fas fa-envelope" [ngClass]="{'text-danger': submitted && f.emailUser.errors}"></i>
              <input type="email" class="form-control" name="email" id="email" placeholder="Votre adresse e-mail"
                [(ngModel)]="emailUser" formControlName="emailUser"
                [ngClass]="{ 'is-invalid-custom': submitted && f.emailUser.errors }">

              @if (submitted && f.emailUser.errors) {
              <span class="invalid-feedback-custom">
                @if (f.emailUser.errors.required) { Email requis }
                @if (f.emailUser.errors.email) { Format d'email invalide }
              </span>
              }
            </div>

            <button type="submit" class="btn-premium-submit">
              <i class="fas fa-paper-plane me-2"></i>Envoyer le lien
            </button>

            <div class="text-center mt-4">
              <a routerLink="/Connexion" class="small text-success fw-bold">
                <i class="fas fa-arrow-left me-1"></i> Revenir à la connexion
              </a>
            </div>
          </form>

        </div>
      </div>
    </div>

  </div>
</section>
